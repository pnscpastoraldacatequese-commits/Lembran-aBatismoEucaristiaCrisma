<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lembranças Sacramentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { width: 100%; max-width: 700px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }
        textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; color: white; }
        
        /* Container flexível */
        .container { display: flex; flex-wrap: wrap; justify-content: center; background: white; margin: 0 auto; }
        
        /* Tamanho Batismo (A4 vertical dividido em 2) */
        .size-batismo { width: 10.5cm; height: 14.85cm; border: 0.1mm solid #ddd; }
        
        /* Tamanho Demais (18x27 cm) */
        .size-outros { width: 18cm; height: 27cm; border: 0.1mm solid #ddd; }

        .card { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; box-sizing: border-box; overflow: hidden;
        }

        .bg-batismo { 
            background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/b6d702f7c4cc79fcf6877fae13a6e10a81fa491a/Batismo.png'); 
            background-size: 100% 100%; 
        }

        .card-clean { background: #fff; }
        .moldura {
            position: absolute; top: 1cm; left: 1cm; right: 1cm; bottom: 1cm;
            border: 3px solid #d4af37; pointer-events: none;
        }

        .nome { 
            font-family: 'Great Vibes', cursive; text-align: center; color: #333; z-index: 10;
            text-shadow: 0px 0px 8px rgba(255,255,255,0.9);
        }
        
        /* Ajuste de fonte por tamanho */
        .size-batismo .nome { font-size: 45px; width: 80%; }
        .size-outros .nome { font-size: 70px; width: 90%; }

        @media print {
            @page { margin: 0; }
            body { background: white; padding: 0; }
            .controls { display: none; }
            .card { border: none; page-break-after: always; }
            /* Se for batismo, permite dois por página se couber */
            .size-batismo { page-break-after: auto; }
            .size-batismo:nth-child(2n) { page-break-after: always; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label><b>Tipo de Documento e Tamanho:</b></label>
        <select id="tipo">
            <option value="batismo">Batismo (Papel A4 - 2 por folha)</option>
            <option value="eucaristia">Primeira Eucaristia (18x27 cm)</option>
            <option value="crisma">Crisma (18x27 cm)</option>
        </select>

        <textarea id="inputRaw" rows="3" placeholder="Cole os nomes aqui..."></textarea>
        <button class="btn" style="background:#4A90E2" onclick="processar()">1. Processar Nomes</button>
        <textarea id="inputFinal" rows="3" style="margin-top:10px"></textarea>
        
        <div class="btn-group">
            <button class="btn" style="background:#27ae60" onclick="gerar()">2. Gerar Visualização</button>
            <button class="btn" style="background:#555" onclick="window.print()">3. Imprimir</button>
        </div>
    </div>

    <div class="container" id="container"></div>

    <script>
        function processar() {
            const raw = document.getElementById('inputRaw').value;
            const lista = raw.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            document.getElementById('inputFinal').value = lista.join(', ');
        }

        function gerar() {
            const nomes = document.getElementById('inputFinal').value.split(',').map(n => n.trim());
            const tipo = document.getElementById('tipo').value;
            const container = document.getElementById('container');
            container.innerHTML = '';

            nomes.forEach(nome => {
                if (!nome) return;
                const card = document.createElement('div');
                
                if (tipo === 'batismo') {
                    card.className = 'card size-batismo bg-batismo';
                    card.innerHTML = `<div class="nome">${nome}</div>`;
                } else {
                    card.className = 'card size-outros card-clean';
                    card.innerHTML = `
                        <div class="moldura"></div>
                        <div style="font-size: 18px; color: #888; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px;">Lembrança de ${tipo.toUpperCase()}</div>
                        <div class="nome">${nome}</div>
                    `;
                }
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
