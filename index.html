<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lembranças de Sacramentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .controls {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-primary { background: #4A90E2; color: white; }
        .btn-print { background: #27ae60; color: white; }

        .container {
            width: 21cm;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background: white;
        }

        .lembranca {
            width: 10.5cm;
            height: 14.85cm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            border: 0.1mm solid #eee;
            background-size: cover;
            background-position: center;
        }

        /* Classes dinâmicas para os fundos */
        .bg-batismo { background-image: url('URL_DA_IMAGEM_BATISMO'); }
        .bg-eucaristia { background-image: url('https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/CrachaRetiroEucaristia/main/Retiro%201%C2%AA%20Eucaristia.png'); }
        .bg-crisma { background-image: url('URL_DA_IMAGEM_CRISMA'); }

        .nome {
            font-family: 'Great Vibes', cursive; /* Fonte elegante para lembranças */
            font-size: 45px;
            text-align: center;
            color: #2c3e50;
            width: 85%;
            z-index: 10;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; padding: 0; }
            .controls { display: none; }
            .lembranca { border: none; page-break-inside: avoid; }
            .lembranca:nth-child(4n+5) { page-break-before: always; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label><b>1. Tipo de Sacramento:</b></label>
        <select id="tipoSacramento">
            <option value="bg-batismo">Batismo</option>
            <option value="bg-eucaristia" selected>Primeira Eucaristia</option>
            <option value="bg-crisma">Crisma</option>
        </select>

        <label><b>2. Lista de nomes:</b></label>
        <textarea id="inputRaw" rows="3" placeholder="Cole os nomes aqui..."></textarea>
        
        <button class="btn btn-primary" onclick="processarEValidar()">Processar Nomes</button>
        
        <textarea id="inputFinal" rows="3" style="margin-top:10px"></textarea>
        
        <div class="btn-group">
            <button class="btn btn-print" onclick="gerarLembrancas()">Gerar Visualização</button>
            <button class="btn btn-primary" style="background:#555" onclick="window.print()">Imprimir PDF</button>
        </div>
    </div>

    <div class="container" id="container"></div>

    <script>
        const PREPOSICOES = ['de', 'do', 'da', 'dos', 'das'];

        function determineProcessedName(name, allNames) {
            const parts = name.split(' ').filter(p => p.length > 0);
            if (parts.length <= 1) return name;
            
            const firstName = parts[0];
            const firstNameCount = allNames.filter(n => n.split(' ')[0].toLowerCase() === firstName.toLowerCase()).length;
            
            if (firstNameCount === 1) return firstName;

            let currentParts = [firstName], i = 1;
            while (i < parts.length) {
                let next = parts[i];
                currentParts.push(next); i++;
                if (PREPOSICOES.includes(next.toLowerCase()) && i < parts.length) {
                    currentParts.push(parts[i]); i++;
                }
                const segment = currentParts.join(' ');
                if (!allNames.some(other => other !== name && other.toLowerCase().startsWith(segment.toLowerCase()))) {
                    return segment;
                }
            }
            return name;
        }

        function processarEValidar() {
            const raw = document.getElementById('inputRaw').value;
            const listaOriginal = raw.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const processados = listaOriginal.map(n => determineProcessedName(n, listaOriginal));
            document.getElementById('inputFinal').value = processados.join(', ');
        }

        function gerarLembrancas() {
            const finalInput = document.getElementById('inputFinal').value;
            const nomes = finalInput.split(/[,\n]/).map(n => n.trim()).filter(n => n.length > 0);
            const tipo = document.getElementById('tipoSacramento').value;
            const container = document.getElementById('container');
            
            container.innerHTML = '';
            nomes.forEach(nome => {
                const card = document.createElement('div');
                card.className = `lembranca ${tipo}`;
                card.innerHTML = `<div class="nome">${nome}</div>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
