<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Lembranças Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f0f0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #27ae60; color: white; width: 100%; margin-top: 10px; }
        
        #container { background: white; }
        
        .card { 
            position: relative; 
            box-sizing: border-box; 
            overflow: hidden; 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            page-break-after: always;
            margin: 0 auto;
            font-family: 'Great Vibes', cursive;
            color: #000;
        }

        .size-a4 { width: 21cm; height: 29.7cm; } 
        .size-special { width: 18cm; height: 27cm; } 

        .content { 
            position: absolute; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.4; 
            font-size: 24px; 
        }
        
        .nome-principal { font-size: 48px; margin-bottom: 10px; }
        b { font-weight: 700; }
        
        .assinatura { 
            position: absolute; 
            text-align: center; 
            font-size: 22px; 
            left: 0; 
            right: 0;
            bottom: 2cm; /* Próximo à margem inferior */
        }
        .linha { width: 250px; border-top: 1px solid #000; margin: 0 auto 5px; }

        /* MARGENS ESPECÍFICAS SOLICITADAS */
        
        /* Batismo: Topo 8cm, Fundo 10cm, Esquerda 4.5cm */
        .card-batismo .content { 
            top: 8cm; 
            bottom: 10cm; 
            left: 4.5cm; 
            right: 2cm; 
        }

        /* Eucaristia: Topo 11cm, Fundo 6cm */
        .card-eucaristia .content { 
            top: 11cm; 
            bottom: 6cm; 
            left: 2cm; 
            right: 2cm; 
        }

        /* Crisma: Topo 11cm, Esquerda 7.5cm */
        .card-crisma .content { 
            top: 11cm; 
            left: 7.5cm; 
            right: 2cm; 
            bottom: 6cm;
        }

        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .card { border: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label><b>1. Selecione o Sacramento:</b></label>
        <select id="tipo">
            <option value="batismo">Batismo (Papel A4)</option>
            <option value="eucaristia">Primeira Eucaristia (18x27 cm)</option>
            <option value="crisma">Crisma (18x27 cm)</option>
        </select>

        <label><b>2. Dados (Separados por ponto e vírgula):</b><br>
        <small>Nome; Nascimento; Naturalidade; Pais; Data Evento; Padrinhos</small></label>
        <textarea id="inputDados" rows="6" placeholder="Ex: João Silva; 10/05/2015; Curitiba; Maria e José; 20/04/2026; Pedro e Ana"></textarea>
        
        <button class="btn" onclick="gerar()">Gerar Lembranças</button>
        <button class="btn" style="background:#555" onclick="window.print()">Imprimir / Salvar PDF</button>
    </div>

    <div id="container"></div>

    <script>
        const configs = {
            batismo: {
                img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/b6d702f7c4cc79fcf6877fae13a6e10a81fa491a/Batismo.png',
                class: 'size-a4 card-batismo'
            },
            eucaristia: {
                img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/07f4f0d35d72eae5c8a27f9b820acacd1829483b/Eucaristia.png',
                class: 'size-special card-eucaristia'
            },
            crisma: {
                img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/07f4f0d35d72eae5c8a27f9b820acacd1829483b/Crisma.png',
                class: 'size-special card-crisma'
            }
        };

        function gerar() {
            const tipo = document.getElementById('tipo').value;
            const rawData = document.getElementById('inputDados').value.trim().split('\n');
            const container = document.getElementById('container');
            container.innerHTML = '';

            rawData.forEach(linha => {
                if (!linha) return;
                const [nome, nasc, natural, pais, dataSacra, padrinhos] = linha.split(';').map(d => d.trim());

                const card = document.createElement('div');
                card.className = `card ${configs[tipo].class}`;
                card.style.backgroundImage = `url('${configs[tipo].img}')`;

                let corpoTexto = "";
                if (tipo === 'batismo') {
                    corpoTexto = `
                        Nascido em <b>${nasc}</b>. Natural de <b>${natural}</b>.<br>
                        Filho de <b>${pais}</b>.<br>
                        Recebeu o Batismo na <b>Paróquia Nossa Senhora da Conceição</b> no dia <b>${dataSacra}</b>.<br>
                        Foram padrinhos <b>${padrinhos}</b>.`;
                } else if (tipo === 'eucaristia') {
                    corpoTexto = `
                        Nascido em <b>${nasc}</b>. Natural de <b>${natural}</b>.<br>
                        Filho de <b>${pais}</b>.<br>
                        Participou pela 1ª vez da Eucaristia no dia <b>${dataSacra}</b> na <b>Paróquia Nossa Senhora da Conceição</b>.`;
                } else {
                    corpoTexto = `
                        Nascido em <b>${nasc}</b>. Natural de <b>${natural}</b>.<br>
                        Filho de <b>${pais}</b>.<br>
                        Recebeu o sacramento do Crisma no dia <b>${dataSacra}</b> na <b>Paróquia Nossa Senhora da Conceição</b>.<br>
                        Foram padrinhos <b>${padrinhos}</b>.`;
                }

                card.innerHTML = `
                    <div class="content">
                        <span class="nome-principal">${nome}</span>
                        <div>${corpoTexto}</div>
                    </div>
                    <div class="assinatura">
                        <div class="linha"></div>
                        <div>Celebrante</div>
                        <span>Pe João Marcos Polak</span>
                    </div>`;

                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
