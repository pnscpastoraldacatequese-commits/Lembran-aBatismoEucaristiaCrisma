<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Lembranças Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f0f0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #27ae60; color: white; width: 100%; margin-top: 10px; }
        
        #container { background: white; }
        
        .card { 
            position: relative; 
            box-sizing: border-box; 
            overflow: hidden; 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            page-break-after: always;
            margin: 0 auto;
            font-family: 'Great Vibes', cursive;
            color: #000;
        }

        .size-a4 { width: 21cm; height: 29.7cm; } 
        .size-special { width: 18cm; height: 27cm; } 

        .content { 
            position: absolute; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.4; 
            font-size: 22px; 
        }
        
        .nome-principal { 
            font-size: 46px; 
            margin-bottom: 10px; 
        }
        b { font-weight: 700; }
        
        .assinatura { 
            margin-top: 4em; 
            text-align: center; 
            font-size: 20px; 
            width: 100%;
        }
        .linha { width: 280px; border-top: 1px solid #000; margin: 0 auto 8px; }

        /* MARGENS DE SEGURANÇA */
        .card-batismo .content { top: 8cm; bottom: 10cm; left: 4.5cm; right: 2cm; }
        .card-eucaristia .content { top: 11cm; bottom: 6.5cm; left: 2cm; right: 2cm; }
        
        /* CRISMA: Fundo reduzido para 3cm para aproximar da margem inferior */
        .card-crisma .content { 
            top: 14cm; 
            bottom: 3cm; 
            left: 7.5cm; 
            right: 2cm; 
        }

        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .card { border: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label><b>1. Sacramento:</b></label>
        <select id="tipo">
            <option value="batismo">Batismo (A4)</option>
            <option value="eucaristia">Primeira Eucaristia (18x27)</option>
            <option value="crisma">Crisma (18x27)</option>
        </select>

        <label><b>2. Dados: Nome; Nascimento; Naturalidade; Pais; Data; Padrinhos</b></label>
        <textarea id="inputDados" rows="4" placeholder="Ex: JOÃO SILVA; 10/01/2015; CURITIBA; MARIA E JOSÉ; 20/05/2026; PEDRO E ANA"></textarea>
        
        <button class="btn" onclick="gerar()">Gerar Lembranças</button>
        <button class="btn" style="background:#555" onclick="window.print()">Imprimir</button>
    </div>

    <div id="container"></div>

    <script>
        const configs = {
            batismo: { img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/b6d702f7c4cc79fcf6877fae13a6e10a81fa491a/Batismo.png', class: 'size-a4 card-batismo' },
            eucaristia: { img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/07f4f0d35d72eae5c8a27f9b820acacd1829483b/Eucaristia.png', class: 'size-special card-eucaristia' },
            crisma: { img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/07f4f0d35d72eae5c8a27f9b820acacd1829483b/Crisma.png', class: 'size-special card-crisma' }
        };

        const paroquia = "<b>Paróquia Nossa Senhora da Conceição - Butiatuvinha - Curitiba/PR</b>";

        function formatarTexto(str) {
            if (!str) return "";
            const excecoes = ['de', 'do', 'da', 'dos', 'das', 'e'];
            return str.toLowerCase().trim().split(/\s+/).map((palavra, index) => {
                if (index !== 0 && excecoes.includes(palavra)) return palavra;
                return palavra.charAt(0).toUpperCase() + palavra.slice(1);
            }).join(' ');
        }

        function gerar() {
            const tipo = document.getElementById('tipo').value;
            const rawData = document.getElementById('inputDados').value.trim().split('\n');
            const container = document.getElementById('container');
            container.innerHTML = '';

            rawData.forEach(linha => {
                if (!linha) return;
                let [nome, nasc, natural, pais, dataSacra, padrinhos] = linha.split(';').map(d => formatarTexto(d));

                const card = document.createElement('div');
                card.className = `card ${configs[tipo].class}`;
                card.style.backgroundImage = `url('${configs[tipo].img}')`;

                let corpo = "";
                if (tipo === 'batismo') {
                    corpo = `Nascido em <b>${nasc}</b>. Natural de <b>${natural}</b>.<br>Filho de <b>${pais}</b>.<br>Recebeu o Batismo na ${paroquia} no dia <b>${dataSacra}</b>.<br>Foram padrinhos <b>${padrinhos}</b>.`;
                } else if (tipo === 'eucaristia') {
                    corpo = `Nascido em <b>${nasc}</b>. Natural de <b>${natural}</b>.<br>Filho de <b>${pais}</b>.<br>Participou pela 1ª vez da Eucaristia no dia <b>${dataSacra}</b> na ${paroquia}.`;
                } else {
                    corpo = `Nascido em <b>${nasc}</b>. Natural de <b>${natural}</b>.<br>Filho de <b>${pais}</b>.<br>Recebeu o sacramento do Crisma no dia <b>${dataSacra}</b> na ${paroquia}.<br>Foram padrinhos <b>${padrinhos}</b>.`;
                }

                card.innerHTML = `
                    <div class="content">
                        <span class="nome-principal">${nome}</span>
                        <div>${corpo}</div>
                        <div class="assinatura">
                            <div class="linha"></div>
                            <div style="margin-bottom: 2px;">Celebrante</div>
                            <span>Pe João Marcos Polak</span>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
