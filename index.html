<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Lembranças Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f0f0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #27ae60; color: white; width: 100%; margin-top: 10px; }
        
        #container { background: white; }
        
        .card { 
            position: relative; 
            box-sizing: border-box; 
            overflow: hidden; 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            page-break-after: always;
            margin: 0 auto;
            /* Aplicando Great Vibes em todo o card */
            font-family: 'Great Vibes', cursive;
            color: #000;
        }

        .size-a4 { width: 21cm; height: 29.7cm; } 
        .size-special { width: 18cm; height: 27cm; } 

        /* Estilo Geral de Texto */
        .content { 
            position: absolute; 
            line-height: 1.4; 
            font-size: 24px; /* Aumentado para melhor leitura da fonte cursiva */
            text-align: left; 
        }
        
        .nome-principal { 
            font-size: 52px; 
            display: block; 
            margin-bottom: 10px; 
        }

        b { font-weight: 700; }
        
        .assinatura { 
            position: absolute; 
            text-align: center; 
            font-size: 22px; 
        }
        .linha { width: 220px; border-top: 1px solid #000; margin: 0 auto 5px; }

        /* POSICIONAMENTO ATUAL (Aguardando suas medições para ajuste fino) */
        .card-batismo .content { left: 4cm; bottom: 10cm; right: 2.5cm; }
        .card-batismo .assinatura { left: 11cm; bottom: 5cm; }

        .card-eucaristia .content { top: 9cm; bottom: 5.5cm; left: 2.5cm; right: 2.5cm; text-align: center; }
        .card-eucaristia .assinatura { bottom: 3cm; left: 0; right: 0; }

        .card-crisma .content { left: 7cm; top: 10.5cm; right: 2.5cm; }
        .card-crisma .assinatura { bottom: 4cm; left: 0; right: 0; }

        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .card { border: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label><b>1. Selecione o Sacramento:</b></label>
        <select id="tipo">
            <option value="batismo">Batismo (A4)</option>
            <option value="eucaristia">Primeira Eucaristia (18x27)</option>
            <option value="crisma">Crisma (18x27)</option>
        </select>

        <label><b>2. Dados (Nome; Nascimento; Pais; Data; Padrinhos):</b></label>
        <textarea id="inputDados" rows="6" placeholder="Nome; Data Nascimento; Pais; Data Sacramento; Padrinhos"></textarea>
        
        <button class="btn" onclick="gerar()">Gerar Lembranças</button>
        <button class="btn" style="background:#555" onclick="window.print()">Imprimir / Salvar PDF</button>
    </div>

    <div id="container"></div>

    <script>
        const configs = {
            batismo: {
                img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/b6d702f7c4cc79fcf6877fae13a6e10a81fa491a/Batismo.png',
                class: 'size-a4 card-batismo'
            },
            eucaristia: {
                img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/07f4f0d35d72eae5c8a27f9b820acacd1829483b/Eucaristia.png',
                class: 'size-special card-eucaristia'
            },
            crisma: {
                img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/07f4f0d35d72eae5c8a27f9b820acacd1829483b/Crisma.png',
                class: 'size-special card-crisma'
            }
        };

        function gerar() {
            const tipo = document.getElementById('tipo').value;
            const rawData = document.getElementById('inputDados').value.trim().split('\n');
            const container = document.getElementById('container');
            container.innerHTML = '';

            rawData.forEach(linha => {
                if (!linha) return;
                const [nome, nasc, pais, dataSacra, padrinhos] = linha.split(';').map(d => d.trim());

                const card = document.createElement('div');
                card.className = `card ${configs[tipo].class}`;
                card.style.backgroundImage = `url('${configs[tipo].img}')`;

                let textoHtml = "";
                if (tipo === 'batismo') {
                    textoHtml = `
                        <span class="nome-principal">${nome}</span>
                        Nascido em <b>${nasc}</b><br>
                        Filho de <b>${pais}</b><br>
                        Recebeu o Batismo na <b>Paróquia Nossa Senhora da Conceição</b> no dia <b>${dataSacra}</b>.<br>
                        Foram padrinhos <b>${padrinhos}</b>.`;
                } else if (tipo === 'eucaristia') {
                    textoHtml = `
                        <span class="nome-principal">${nome}</span>
                        Nascido em <b>${nasc}</b><br>
                        Filho de <b>${pais}</b><br>
                        Participou pela 1ª vez da Eucaristia no dia <b>${dataSacra}</b> na <b>Paróquia Nossa Senhora da Conceição</b>.`;
                } else {
                    textoHtml = `
                        <span class="nome-principal">${nome}</span>
                        Nascido em <b>${nasc}</b><br>
                        Filho de <b>${pais}</b><br>
                        Recebeu o sacramento do Crisma no dia <b>${dataSacra}</b> na <b>Paróquia Nossa Senhora da Conceição</b>.<br>
                        Foram padrinhos <b>${padrinhos}</b>.`;
                }

                card.innerHTML = `
                    <div class="content">${textoHtml}</div>
                    <div class="assinatura">
                        <div class="linha"></div>
                        <span>Pe João Marcos Polak</span>
                    </div>`;

                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
