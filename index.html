<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Lembranças</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f0f0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #27ae60; color: white; width: 100%; margin-top: 10px; }
        
        .container { background: white; display: block; }
        
        /* Definição de Tamanhos */
        .card { 
            position: relative; 
            box-sizing: border-box; 
            overflow: hidden; 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            page-break-after: always;
            margin: 0 auto;
        }

        .size-a4 { width: 21cm; height: 29.7cm; } /* Batismo em folha cheia */
        .size-special { width: 18cm; height: 27cm; } /* Eucaristia/Crisma */

        /* Estilização dos Textos */
        .content {
            position: absolute;
            top: 25%; /* Ajuste aqui para subir ou descer o bloco de texto */
            left: 10%;
            right: 10%;
            text-align: center;
            line-height: 1.8;
            font-size: 18px;
            color: #000;
        }

        .nome-principal { font-size: 32px; font-weight: bold; display: block; margin-bottom: 20px; }
        b { font-weight: 700; }

        .assinatura {
            position: absolute;
            bottom: 15%;
            left: 0;
            right: 0;
            text-align: center;
        }
        .linha { width: 60%; border-top: 1px solid #000; margin: 0 auto 5px; }

        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .card { border: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label><b>1. Selecione o Sacramento:</b></label>
        <select id="tipo">
            <option value="batismo">Batismo (Papel A4)</option>
            <option value="eucaristia">Eucaristia (18x27 cm)</option>
            <option value="crisma">Crisma (18x27 cm)</option>
        </select>

        <label><b>2. Dados (Um por linha, use ";" para separar os campos):</b><br>
        <small>Formato: Nome; Nascimento; Filiação; Data Sacramento; Padrinhos (apenas batismo)</small></label>
        <textarea id="inputDados" rows="6" placeholder="Ex: João Silva; 10/05/2015; Maria e José; 20/04/2026; Pedro e Ana"></textarea>
        
        <button class="btn" onclick="gerar()">Gerar Lembranças</button>
        <button class="btn" style="background:#555" onclick="window.print()">Imprimir / Salvar PDF</button>
    </div>

    <div id="container"></div>

    <script>
        const configs = {
            batismo: {
                img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/b6d702f7c4cc79fcf6877fae13a6e10a81fa491a/Batismo.png',
                class: 'size-a4'
            },
            eucaristia: {
                img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/07f4f0d35d72eae5c8a27f9b820acacd1829483b/Eucaristia.png',
                class: 'size-special'
            },
            crisma: {
                img: 'https://raw.githubusercontent.com/pnscpastoraldacatequese-commits/Lembran-aBatismoEucaristiaCrisma/07f4f0d35d72eae5c8a27f9b820acacd1829483b/Crisma.png',
                class: 'size-special'
            }
        };

        function gerar() {
            const tipo = document.getElementById('tipo').value;
            const rawData = document.getElementById('inputDados').value.trim().split('\n');
            const container = document.getElementById('container');
            container.innerHTML = '';

            rawData.forEach(linha => {
                if (!linha) return;
                const dados = linha.split(';').map(d => d.trim());
                const [nome, nasc, pais, dataSacra, padrinhos] = dados;

                const card = document.createElement('div');
                card.className = `card ${configs[tipo].class}`;
                card.style.backgroundImage = `url('${configs[tipo].img}')`;

                let htmlContent = '';

                if (tipo === 'batismo') {
                    htmlContent = `
                        <div class="content">
                            <span class="nome-principal">${nome}</span>
                            Nascido em <b>${nasc}</b><br>
                            Filho de <b>${pais}</b><br>
                            Recebeu o Batismo na <b>Paróquia Nossa Senhora da Conceição</b> no dia <b>${dataSacra}</b>.<br>
                            Foram padrinhos <b>${padrinhos}</b>.
                        </div>`;
                } else if (tipo === 'eucaristia') {
                    htmlContent = `
                        <div class="content">
                            <span class="nome-principal">${nome}</span>
                            Nascido em <b>${nasc}</b><br>
                            Filho de <b>${pais}</b><br>
                            Participou pela 1ª vez da Eucaristia no dia <b>${dataSacra}</b> na <b>Paróquia Nossa Senhora da Conceição</b>.
                        </div>`;
                } else {
                    htmlContent = `
                        <div class="content">
                            <span class="nome-principal">${nome}</span>
                            Nascido em <b>${nasc}</b><br>
                            Filho de <b>${pais}</b><br>
                            Recebeu o sacramento do Crisma no dia <b>${dataSacra}</b> na <b>Paróquia Nossa Senhora da Conceição</b>.
                        </div>`;
                }

                card.innerHTML = htmlContent + `
                    <div class="assinatura">
                        <div class="linha"></div>
                        <span>Pe João Marcos Polak</span>
                    </div>`;

                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
